# Application
spring.application.name=equity-pnl-service
server.port=8080

# Profiles
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Database
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:60333/equity}
spring.datasource.username=${DATABASE_USERNAME:carjam}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hikari Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JPA/Hibernate Optimizations
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true
spring.jpa.properties.hibernate.query.plan_cache_max_size=2048
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# External APIs
finhub.url=${FINHUB_URL:https://finnhub.io/api/v1}
finhub.key=${FINHUB_KEY}

# Secondary corporate actions provider (M&A, spinoffs, symbol changes)
# Default: disabled — Finnhub-only is sufficient for splits/dividends (see docs/corporate-actions/PROVIDER_STRATEGY.md)
# Paid options later: Polygon, Databento, QUODD. Zero-cost option: SEC EDGAR parser (EdgarCorporateActionProvider).
corporate-actions.secondary.enabled=${CORPORATE_ACTIONS_SECONDARY_ENABLED:false}
corporate-actions.secondary.url=${CORPORATE_ACTIONS_SECONDARY_URL:}
corporate-actions.secondary.api-key=${CORPORATE_ACTIONS_SECONDARY_API_KEY:}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Request size limits
server.tomcat.max-http-form-post-size=2MB
server.tomcat.max-swallow-size=2MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.connection-timeout=20000

# Resilience4j Circuit Breaker Configuration
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=5
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=60s
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.slowCallRateThreshold=50
resilience4j.circuitbreaker.configs.default.slowCallDurationThreshold=5s
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true

# Finhub-specific circuit breaker
resilience4j.circuitbreaker.instances.finhub.baseConfig=default
resilience4j.circuitbreaker.instances.finhub.slidingWindowSize=20
resilience4j.circuitbreaker.instances.finhub.minimumNumberOfCalls=10
resilience4j.circuitbreaker.instances.finhub.waitDurationInOpenState=30s

# Retry Configuration
# Default retry config for most operations
resilience4j.retry.configs.default.maxAttempts=${RETRY_MAX_ATTEMPTS:3}
resilience4j.retry.configs.default.waitDuration=${RETRY_WAIT_DURATION:500ms}
resilience4j.retry.configs.default.enableExponentialBackoff=true
resilience4j.retry.configs.default.exponentialBackoffMultiplier=${RETRY_BACKOFF_MULTIPLIER:2}
resilience4j.retry.configs.default.retryExceptions=org.springframework.web.reactive.function.client.WebClientRequestException,org.springframework.web.reactive.function.client.WebClientResponseException,java.net.ConnectException,java.io.IOException

# External API retry config (more aggressive for flaky external services)
resilience4j.retry.configs.external-api.maxAttempts=${RETRY_EXTERNAL_API_MAX_ATTEMPTS:4}
resilience4j.retry.configs.external-api.waitDuration=${RETRY_EXTERNAL_API_WAIT_DURATION:1s}
resilience4j.retry.configs.external-api.enableExponentialBackoff=true
resilience4j.retry.configs.external-api.exponentialBackoffMultiplier=${RETRY_EXTERNAL_API_BACKOFF_MULTIPLIER:2}
resilience4j.retry.configs.external-api.exponentialMaxWaitDuration=${RETRY_EXTERNAL_API_MAX_WAIT:10s}
resilience4j.retry.configs.external-api.retryExceptions=org.springframework.web.reactive.function.client.WebClientRequestException,org.springframework.web.reactive.function.client.WebClientResponseException,java.net.ConnectException,java.io.IOException,java.util.concurrent.TimeoutException

# Finhub API retry (inherits from external-api config)
resilience4j.retry.instances.finhub.baseConfig=external-api
resilience4j.retry.instances.finhub.maxAttempts=${RETRY_FINHUB_MAX_ATTEMPTS:4}
resilience4j.retry.instances.finhub.waitDuration=${RETRY_FINHUB_WAIT_DURATION:1s}

# Database retry config (lighter retry for transient DB issues)
resilience4j.retry.configs.database.maxAttempts=${RETRY_DB_MAX_ATTEMPTS:2}
resilience4j.retry.configs.database.waitDuration=${RETRY_DB_WAIT_DURATION:100ms}
resilience4j.retry.configs.database.enableExponentialBackoff=true
resilience4j.retry.configs.database.exponentialBackoffMultiplier=2
resilience4j.retry.configs.database.retryExceptions=org.springframework.dao.TransientDataAccessException,org.springframework.dao.RecoverableDataAccessException,java.sql.SQLException

# Bulkhead Configuration
resilience4j.bulkhead.configs.default.maxConcurrentCalls=10
resilience4j.bulkhead.configs.default.maxWaitDuration=500ms

resilience4j.thread-pool-bulkhead.configs.default.maxThreadPoolSize=10
resilience4j.thread-pool-bulkhead.configs.default.coreThreadPoolSize=5
resilience4j.thread-pool-bulkhead.configs.default.queueCapacity=100

resilience4j.thread-pool-bulkhead.instances.finhub.baseConfig=default
resilience4j.thread-pool-bulkhead.instances.finhub.maxThreadPoolSize=20
resilience4j.thread-pool-bulkhead.instances.finhub.coreThreadPoolSize=10

# Time Limiter Configuration
resilience4j.timelimiter.configs.default.timeoutDuration=10s
resilience4j.timelimiter.configs.default.cancelRunningFuture=true
resilience4j.timelimiter.instances.finhub.timeoutDuration=5s

# Health
management.health.circuitbreakers.enabled=true

# Timezone Configuration
# Supported values: UTC, America/Los_Angeles, America/New_York, Europe/London, etc.
# See https://docs.oracle.com/en/java/javase/17/docs/api/java.base/java/util/TimeZone.html
application.timezone.id=${APP_TIMEZONE:UTC}

# Logging
logging.level.root=INFO
logging.level.com.companyx.equity=INFO
logging.level.org.springframework.web=INFO
