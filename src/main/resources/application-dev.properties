# Development Environment - More aggressive retry settings for local testing

# Retry Configuration - Development
# Faster retries for local development
RETRY_MAX_ATTEMPTS=2
RETRY_WAIT_DURATION=200ms
RETRY_BACKOFF_MULTIPLIER=2

# External API retries - lighter for dev
RETRY_EXTERNAL_API_MAX_ATTEMPTS=3
RETRY_EXTERNAL_API_WAIT_DURATION=500ms
RETRY_EXTERNAL_API_BACKOFF_MULTIPLIER=2
RETRY_EXTERNAL_API_MAX_WAIT=5s

# Finhub retries - dev settings
RETRY_FINHUB_MAX_ATTEMPTS=3
RETRY_FINHUB_WAIT_DURATION=500ms

# Database retries - minimal in dev
RETRY_DB_MAX_ATTEMPTS=1
RETRY_DB_WAIT_DURATION=50ms

# Logging - more verbose in dev
logging.level.com.companyx.equity=DEBUG
logging.level.io.github.resilience4j=DEBUG

# Real-world corporate action fixtures for local demos (see FixtureCorporateActionData)
corporate-actions.fixture.enabled=true
