# Staging — production-like settings with Swagger and Prometheus enabled

spring.config.activate.on-profile=staging

# Database (override via env in staging deploy)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://equity-db:3306/equity}
spring.datasource.username=${DATABASE_USERNAME:equity}
spring.datasource.password=${DATABASE_PASSWORD:changeme}

# Redis L2 cache (requires redis service in docker-compose.staging.yml)
cache.redis.enabled=${CACHE_REDIS_ENABLED:true}
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

# Observability
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.export.prometheus.enabled=true
management.endpoint.prometheus.enabled=true

# Swagger enabled for staging validation
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# Fixtures off in staging
corporate-actions.fixture.enabled=false

# Logging — JSON via logback-spring.xml staging profile
logging.level.com.companyx.equity=INFO
logging.level.io.github.resilience4j=WARN
