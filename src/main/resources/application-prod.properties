# Production Environment - Conservative retry settings

# Retry Configuration - Production
# Conservative defaults for production stability
RETRY_MAX_ATTEMPTS=3
RETRY_WAIT_DURATION=500ms
RETRY_BACKOFF_MULTIPLIER=2

# External API retries - production settings
RETRY_EXTERNAL_API_MAX_ATTEMPTS=4
RETRY_EXTERNAL_API_WAIT_DURATION=1s
RETRY_EXTERNAL_API_BACKOFF_MULTIPLIER=2
RETRY_EXTERNAL_API_MAX_WAIT=15s

# Finhub retries - production settings
RETRY_FINHUB_MAX_ATTEMPTS=4
RETRY_FINHUB_WAIT_DURATION=1s

# Database retries - production settings
RETRY_DB_MAX_ATTEMPTS=3
RETRY_DB_WAIT_DURATION=200ms

# Logging - less verbose in production
logging.level.com.companyx.equity=INFO
logging.level.io.github.resilience4j=WARN

# Disable Swagger UI in production
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
