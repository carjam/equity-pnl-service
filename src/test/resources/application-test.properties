# Test profile — in-memory H2; no MySQL or external API keys required

spring.datasource.url=jdbc:h2:mem:equity_${random.uuid};MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.flyway.enabled=false

jwt.secret=test-secret-key-that-is-at-least-256-bits-long-for-hs256-algorithm-security-requirements
jwt.expiration=3600000
finhub.key=test-finhub-key
finhub.url=http://localhost:9999

application.timezone.id=UTC

# Fixtures off in tests — e2e tests construct FixtureCorporateActionProvider directly
corporate-actions.fixture.enabled=false

# Faster retries for unit tests
resilience4j.retry.instances.finhub.maxAttempts=3
resilience4j.retry.instances.finhub.waitDuration=10ms
resilience4j.retry.instances.finhub.enableExponentialBackoff=true
resilience4j.retry.instances.finhub.exponentialBackoffMultiplier=2

resilience4j.circuitbreaker.instances.finhub.slidingWindowSize=5
resilience4j.circuitbreaker.instances.finhub.minimumNumberOfCalls=3
resilience4j.circuitbreaker.instances.finhub.failureRateThreshold=50
resilience4j.circuitbreaker.instances.finhub.waitDurationInOpenState=500ms

management.health.circuitbreakers.enabled=false

resilience4j.timelimiter.instances.finhub.timeoutDuration=2s

logging.level.com.companyx.equity=WARN
logging.level.io.github.resilience4j=WARN
