services:
  equity-app:
    image: ${APP_IMAGE:-ghcr.io/${GITHUB_REPOSITORY:-local/equity-pnl-service}:latest}
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: staging
      DATABASE_URL: jdbc:mysql://equity-db:3306/equity_pnl
      DATABASE_USERNAME: ${DATABASE_USERNAME:-equity}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-staging}
      FINHUB_KEY: ${FINHUB_KEY:-}
      CACHE_REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      equity-db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  equity-db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: equity_pnl
      MYSQL_USER: ${DATABASE_USERNAME:-equity}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD:-changeme}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootchangeme}
    volumes:
      - equity-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

volumes:
  equity-db-data:
  redis-data:
