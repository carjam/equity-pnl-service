name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Maven Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Verify JDK
        run: |
          java -version
          javac -version
          chmod +x mvnw
          ./mvnw -version

      - name: Run tests
        run: ./mvnw test -B

  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Verify JDK
        run: |
          java -version
          javac -version
          chmod +x mvnw
          ./mvnw -version

      - name: Restore OWASP NVD cache
        uses: actions/cache@v4
        with:
          path: .dependency-check-data
          key: owasp-nvd-${{ runner.os }}-v1
          restore-keys: |
            owasp-nvd-${{ runner.os }}-

      - name: Prepare NVD cache
        id: nvd-cache
        run: |
          if [ -f .dependency-check-data/odc.mv.db ]; then
            echo "has_db=true" >> $GITHUB_OUTPUT
            echo "Using restored NVD H2 cache ($(du -sh .dependency-check-data | cut -f1))"
          else
            echo "has_db=false" >> $GITHUB_OUTPUT
            echo "No valid NVD cache — removing empty/partial data before sync"
            rm -rf .dependency-check-data
          fi

      - name: Run OWASP Dependency-Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          chmod +x mvnw
          if [ -z "$NVD_API_KEY" ]; then
            echo "::notice::NVD_API_KEY secret not set — add it in repo Settings → Secrets for faster, more reliable NVD sync (https://nvd.nist.gov/developers/request-an-api-key)"
          fi

          run_check() {
            ./mvnw dependency-check:check -B "$@"
          }

          # Fast path: cached H2 DB — no NVD API calls (avoids 524/timeouts)
          if [ "${{ steps.nvd-cache.outputs.has_db }}" = "true" ]; then
            run_check -Ddependency-check.autoUpdate=false
            exit $?
          fi

          # Cold cache: sync NVD, then analyze offline
          for attempt in 1 2 3; do
            echo "NVD update-only attempt $attempt/3..."
            if ./mvnw dependency-check:update-only -B; then
              if [ -f .dependency-check-data/odc.mv.db ]; then
                run_check -Ddependency-check.autoUpdate=false
                exit $?
              fi
            fi
            echo "NVD sync failed or incomplete (NIST often returns 503/524); retrying in $((attempt * 60))s..."
            sleep $((attempt * 60))
          done

          echo "::error::No NVD cache available. Trigger Actions → OWASP NVD Cache Refresh (workflow_dispatch) when NIST is healthy, then re-run this job."
          exit 1

      - name: Purge invalid NVD cache
        if: always()
        run: |
          if [ -d .dependency-check-data ] && [ ! -f .dependency-check-data/odc.mv.db ]; then
            rm -rf .dependency-check-data
            echo "Removed invalid/partial NVD cache so the next run does not restore empty data"
          fi

      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          if-no-files-found: ignore

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
