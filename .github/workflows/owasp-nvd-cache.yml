# Populates the OWASP NVD H2 cache used by CI (see ci.yml dependency-check job).
# Requires dependency-check 12.x (cache key dc12). Run manually after NVD outages.
name: OWASP NVD Cache Refresh

on:
  schedule:
    - cron: '0 5 * * 0'
  workflow_dispatch:

concurrency:
  group: owasp-nvd-cache
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  refresh:
    name: Refresh NVD cache
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Restore OWASP NVD cache
        uses: actions/cache@v4
        with:
          path: .dependency-check-data
          key: owasp-nvd-${{ runner.os }}-dc12
          restore-keys: |
            owasp-nvd-${{ runner.os }}-

      - name: Sync NVD data
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          chmod +x mvnw
          if [ -z "$NVD_API_KEY" ]; then
            echo "::warning::NVD_API_KEY not set — sync will be slow and may fail (503/524/timeouts)"
          fi

          sync_nvd() {
            # Fresh JVM + clean data dir avoids corrupt H2 after NVD disconnects
            rm -rf .dependency-check-data
            ./mvnw dependency-check:update-only -B
          }

          for attempt in 1 2 3 4 5; do
            echo "NVD update-only attempt $attempt/5..."
            if sync_nvd && [ -f .dependency-check-data/odc.mv.db ]; then
              echo "NVD cache ready ($(du -sh .dependency-check-data | cut -f1))"
              exit 0
            fi
            echo "NVD sync failed (NIST 503/524 or HTTP client shutdown); waiting $((attempt * 120))s..."
            rm -rf .dependency-check-data
            sleep $((attempt * 120))
          done

          echo "::error::NVD sync failed after 5 attempts. Re-run when https://nvd.nist.gov is healthy."
          exit 1

      - name: Save OWASP NVD cache
        uses: actions/cache/save@v4
        with:
          path: .dependency-check-data
          key: owasp-nvd-${{ runner.os }}-dc12
