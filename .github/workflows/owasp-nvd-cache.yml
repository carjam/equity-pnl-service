# Populates the OWASP NVD H2 cache used by owasp.yml.
# Uses NIST JSON 2.0 bulk feeds (see pom.xml nvdDatafeedUrl) — ~15–45 min, not API pagination.
name: OWASP NVD Cache Refresh

on:
  schedule:
    - cron: '0 5 * * 0'
  workflow_dispatch:

concurrency:
  group: owasp-nvd-cache
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  refresh:
    name: Refresh NVD cache
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Restore OWASP NVD cache
        uses: actions/cache@v4
        with:
          path: .dependency-check-data
          key: owasp-nvd-${{ runner.os }}-dc12feed
          restore-keys: |
            owasp-nvd-${{ runner.os }}-

      - name: Sync NVD data
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          chmod +x mvnw

          if [ -f .dependency-check-data/odc.mv.db ]; then
            echo "Updating existing NVD cache ($(du -sh .dependency-check-data | cut -f1))"
          else
            echo "No NVD cache yet — downloading NIST JSON 2.0 feeds (~25 files, expect 15–45 min)"
            echo "Logs should show 'Download Started for NVD Cache - ...nvdcve-2.0-YYYY.json.gz', NOT 'Downloaded N/359,555'"
          fi

          sync_nvd() {
            ./mvnw dependency-check:update-only -B 2>&1 | tee /tmp/odc-update.log
            test ${PIPESTATUS[0]} -eq 0
          }

          for attempt in 1 2 3 4 5; do
            echo "NVD update-only attempt $attempt/5..."
            if sync_nvd && [ -f .dependency-check-data/odc.mv.db ]; then
              if grep -q 'Downloaded [0-9]*/359,555' /tmp/odc-update.log; then
                echo "::error::NVD API pagination detected — nvdDatafeedUrl is not active. Check pom.xml spelling (lowercase 'feed')."
                exit 1
              fi
              echo "NVD cache ready ($(du -sh .dependency-check-data | cut -f1))"
              exit 0
            fi
            echo "NVD sync failed (NIST 503/524, timeout, or HTTP client shutdown); waiting $((attempt * 120))s..."
            if [ -d .dependency-check-data ] && [ ! -f .dependency-check-data/odc.mv.db ]; then
              rm -rf .dependency-check-data
            fi
            sleep $((attempt * 120))
          done

          echo "::error::NVD sync failed after 5 attempts. Re-run when https://nvd.nist.gov is healthy."
          exit 1

      - name: Save OWASP NVD cache
        if: always() && hashFiles('.dependency-check-data/odc.mv.db') != ''
        uses: actions/cache/save@v4
        with:
          path: .dependency-check-data
          key: owasp-nvd-${{ runner.os }}-dc12feed
