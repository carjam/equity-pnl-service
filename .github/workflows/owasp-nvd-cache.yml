# Populates the OWASP NVD H2 cache used by CI (see ci.yml dependency-check job).
# Run manually after NVD outages, or rely on the weekly schedule.
name: OWASP NVD Cache Refresh

on:
  schedule:
    - cron: '0 5 * * 0'
  workflow_dispatch:

concurrency:
  group: owasp-nvd-cache
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  refresh:
    name: Refresh NVD cache
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Restore OWASP NVD cache
        uses: actions/cache@v4
        with:
          path: .dependency-check-data
          key: owasp-nvd-${{ runner.os }}-v1
          restore-keys: |
            owasp-nvd-${{ runner.os }}-

      - name: Sync NVD data
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          chmod +x mvnw
          if [ -z "$NVD_API_KEY" ]; then
            echo "::warning::NVD_API_KEY not set — sync will be slow and may fail (524/timeouts)"
          fi
          for attempt in 1 2 3 4 5; do
            echo "NVD update-only attempt $attempt/5..."
            if ./mvnw dependency-check:update-only -B; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "::error::NVD sync failed after 5 attempts"
              exit 1
            fi
            sleep $((attempt * 90))
          done
          if [ ! -f .dependency-check-data/odc.mv.db ]; then
            echo "::error::NVD sync finished but odc.mv.db is missing"
            exit 1
          fi
          echo "NVD cache ready ($(du -sh .dependency-check-data | cut -f1))"

      - name: Save OWASP NVD cache
        uses: actions/cache/save@v4
        with:
          path: .dependency-check-data
          key: owasp-nvd-${{ runner.os }}-v1
