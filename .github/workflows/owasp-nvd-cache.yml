# Populates the OWASP NVD H2 cache used by owasp.yml.
# Full initial sync can take 2–4 h with NVD_API_KEY; re-runs resume partial progress.
name: OWASP NVD Cache Refresh

on:
  schedule:
    - cron: '0 5 * * 0'
  workflow_dispatch:

concurrency:
  group: owasp-nvd-cache
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  refresh:
    name: Refresh NVD cache
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Restore OWASP NVD cache
        uses: actions/cache@v4
        with:
          path: .dependency-check-data
          key: owasp-nvd-${{ runner.os }}-dc12
          restore-keys: |
            owasp-nvd-${{ runner.os }}-

      - name: Sync NVD data
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          chmod +x mvnw
          if [ -z "$NVD_API_KEY" ]; then
            echo "::warning::NVD_API_KEY not set — sync will be very slow and may hit the 6 h job limit"
          fi

          if [ -f .dependency-check-data/odc.mv.db ]; then
            echo "Resuming/updating existing NVD cache ($(du -sh .dependency-check-data | cut -f1))"
          else
            echo "No NVD cache yet — full sync of ~360k CVEs; expect 2–4 h with NVD_API_KEY"
          fi

          sync_nvd() {
            ./mvnw dependency-check:update-only -B
          }

          for attempt in 1 2 3 4 5; do
            echo "NVD update-only attempt $attempt/5..."
            if sync_nvd && [ -f .dependency-check-data/odc.mv.db ]; then
              echo "NVD cache ready ($(du -sh .dependency-check-data | cut -f1))"
              exit 0
            fi
            echo "NVD sync failed (NIST 503/524, timeout, or HTTP client shutdown); waiting $((attempt * 120))s..."
            # Only wipe a corrupt partial download; keep progress so retries resume from last checkpoint
            if [ -d .dependency-check-data ] && [ ! -f .dependency-check-data/odc.mv.db ]; then
              rm -rf .dependency-check-data
            fi
            sleep $((attempt * 120))
          done

          echo "::error::NVD sync failed after 5 attempts. Re-run this workflow when https://nvd.nist.gov is healthy — partial progress is kept in cache when odc.mv.db exists."
          exit 1

      - name: Save OWASP NVD cache
        if: always() && hashFiles('.dependency-check-data/odc.mv.db') != ''
        uses: actions/cache/save@v4
        with:
          path: .dependency-check-data
          key: owasp-nvd-${{ runner.os }}-dc12
