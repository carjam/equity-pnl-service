name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Container image tag (default latest)'
        required: false
        default: latest
  push:
    branches: [main]
    paths:
      - 'docker-compose.staging.yml'
      - '.github/workflows/deploy-staging.yml'

permissions:
  contents: read

jobs:
  validate-compose:
    name: Validate staging compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.staging.yml
        run: docker compose -f docker-compose.staging.yml config

  deploy:
    name: Deploy to staging host
    runs-on: ubuntu-latest
    needs: validate-compose
    if: github.event_name == 'workflow_dispatch'
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        if: env.STAGING_HOST != ''
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$STAGING_HOST" ] || [ -z "$STAGING_USER" ] || [ -z "$STAGING_SSH_KEY" ]; then
            echo "::notice::Set STAGING_HOST, STAGING_USER, and STAGING_SSH_KEY secrets to enable remote deploy."
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$STAGING_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh -o StrictHostKeyChecking=no "${STAGING_USER}@${STAGING_HOST}" <<EOF
            set -e
            cd ~/equity-pnl-service || mkdir -p ~/equity-pnl-service && cd ~/equity-pnl-service
            export APP_IMAGE=ghcr.io/${{ github.repository }}:${IMAGE_TAG}
            docker login ghcr.io -u ${{ github.actor }} -p ${GHCR_TOKEN}
            docker compose -f docker-compose.staging.yml pull equity-app
            docker compose -f docker-compose.staging.yml up -d
          EOF

      - name: Manual deploy instructions
        if: env.STAGING_HOST == ''
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
        run: |
          echo "Remote deploy skipped — configure STAGING_HOST / STAGING_USER / STAGING_SSH_KEY secrets."
          echo "Local staging smoke test:"
          echo "  export APP_IMAGE=ghcr.io/${{ github.repository }}:${{ github.event.inputs.image_tag || 'latest' }}"
          echo "  docker compose -f docker-compose.staging.yml up -d"
