# OWASP dependency-check — fast scan using a pre-warmed NVD cache.
# Cold NVD sync (360k+ CVEs) belongs in owasp-nvd-cache.yml only — never on push.
name: OWASP Dependency Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: owasp-nvd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Restore OWASP NVD cache
        uses: actions/cache@v4
        with:
          path: .dependency-check-data
          key: owasp-nvd-${{ runner.os }}-dc12feed
          restore-keys: |
            owasp-nvd-${{ runner.os }}-

      - name: Require NVD cache
        run: |
          if [ ! -f .dependency-check-data/odc.mv.db ]; then
            echo "::error::NVD cache missing. Run Actions → OWASP NVD Cache Refresh (workflow_dispatch) once, then re-run this workflow (~2–5 min after cache exists)."
            exit 1
          fi
          echo "Using NVD H2 cache ($(du -sh .dependency-check-data | cut -f1))"

      - name: Run OWASP Dependency-Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          chmod +x mvnw
          ./mvnw dependency-check:check -B -Ddependency-check.autoUpdate=false

      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          if-no-files-found: ignore
